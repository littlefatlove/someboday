    <style type="text/tailwindcss">
        @layer theme {
            :root {
                --primary-color: #10b981; /* Emerald 500 */
                --primary-hover: #059669; /* Emerald 600 */
                --secondary-color: #ecfdf5; /* Emerald 50 */
            }
        }
        @layer components {
            button {
                transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                border-radius: 9999px !important;
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.1) 100%) !important;

                -webkit-backdrop-filter: blur(10px) saturate(150%);
                border: 1px solid rgba(255, 255, 255, 0.8) !important;
                color: #065f46 !important;
                box-shadow: 
                    0 8px 16px -4px rgba(16, 185, 129, 0.15),
                    inset 0 2px 5px rgba(255, 255, 255, 0.9),
                    inset 0 -2px 5px rgba(255, 255, 255, 0.2) !important;
            }
            button:hover {
                box-shadow: 
                    0 12px 20px -4px rgba(16, 185, 129, 0.2),
                    inset 0 2px 5px rgba(255, 255, 255, 1),
                    inset 0 -2px 5px rgba(255, 255, 255, 0.3) !important;
            }
            button:active {
                transform: scale(0.92);
            }
            
            .liquid-glass {
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%);
                backdrop-filter: blur(20px) saturate(150%);
                -webkit-backdrop-filter: blur(20px) saturate(150%);

                box-shadow: 
                    0 30px 60px -15px rgba(16, 185, 129, 0.15),
                    inset 0 4px 15px rgba(255, 255, 255, 0.9),
                    inset 0 -4px 15px rgba(255, 255, 255, 0.3);
            }

            .liquid-input {
                background: rgba(255, 255, 255, 0.5);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.8);
                box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 2px 10px rgba(255, 255, 255, 0.8);
                transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .liquid-input:focus {
                background: rgba(255, 255, 255, 0.8);
                box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02), 0 0 0 4px rgba(16, 185, 129, 0.2);
                transform: scale(1.02);
            }
        }
